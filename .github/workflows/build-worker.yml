name: Build & Push RunPod Worker

on:
  push:
    branches: [main]
    paths:
      - "serverless/**"
      - ".github/workflows/build-worker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./serverless
          push: true
          tags: ghcr.io/ziiadd33/quran-worker:latest
