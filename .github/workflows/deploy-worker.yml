name: Build & Deploy RunPod Worker

on:
  push:
    branches: [main]
    paths:
      - "serverless/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./serverless
          push: true
          tags: |
            ghcr.io/ziiadd33/quran-worker:latest
            ghcr.io/ziiadd33/quran-worker:${{ github.sha }}

      - name: Update RunPod endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          curl -s -X PATCH \
            "https://api.runpod.io/v2/cy7nb8azy7wad9/endpoint" \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\": \"ghcr.io/ziiadd33/quran-worker:${{ github.sha }}\"}" \
            | echo "RunPod update response: $(cat)"
